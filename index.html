<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechPowerUp2 - Banco de Dados de GPUs</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">TechPowerUp2 - GPUs</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">
                        <h5>Filtros</h5>
                    </div>
                    <div class="card-body">
                        <label>Fabricante</label>
                        <select id="filterBrand" class="form-control mb-3">
                            <option value="all">Todos</option>
                            <option value="NVIDIA">NVIDIA</option>
                            <option value="AMD">AMD</option>
                            <option value="Intel">Intel</option>
                        </select>
                        
                        <label>VRAM Mínima</label>
                        <input type="range" id="vramFilter" class="form-range" min="0" max="24" step="2">
                        <span id="vramValue" class="badge bg-primary">0 GB</span>
                    </div>
                </div>
            </div>
            
            <div class="col-md-9">
                <div class="row" id="gpuList">
                    <!-- GPUs serão carregadas aqui -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
